<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quizable — Partner Courses</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a26;
      --border: #2a2a3d; --accent: #6c63ff; 
      --text: #e8e8f0; --text-muted: #6b6b8a; --text-dim: #9999b8;
    }
    
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; padding: 80px 1.5rem 2rem; }

    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; padding: 0 2rem; height: 64px; background: rgba(10, 10, 15, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); }
    .nav-logo { font-family: 'Syne', sans-serif; font-weight: 800; text-decoration: none; color: white; }

    .container { max-width: 800px; margin: 0 auto; }

    /* ── PW STYLE COURSE CARD ── */
    .course-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px; /* Soft rounded corners like the app */
      overflow: hidden;
      margin-bottom: 2rem;
      transition: transform 0.3s ease;
    }

    .banner-wrapper {
      width: 100%;
      aspect-ratio: 16 / 9;
      position: relative;
      background: #1a1a26;
    }

    .banner-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .course-info {
      padding: 1.5rem 2rem;
    }

    .tag-row { display: flex; align-items: center; gap: 10px; margin-bottom: 0.8rem; }
    .category-tag { color: #ff8c42; font-weight: 700; font-size: 0.85rem; }
    .lang-badge { 
      background: var(--surface2); color: var(--text-muted); 
      font-size: 0.7rem; padding: 2px 8px; border-radius: 4px; 
      border: 1px solid var(--border); text-transform: uppercase;
    }

    .title { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800; margin-bottom: 1rem; color: #fff; }

    .meta-list { display: flex; flex-direction: column; gap: 0.8rem; margin-bottom: 2rem; }
    .meta-item { display: flex; align-items: center; gap: 10px; color: var(--text-dim); font-size: 0.95rem; }
    .meta-icon { width: 18px; opacity: 0.7; }

    .footer-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }

    .price-block { display: flex; flex-direction: column; }
    .price-current { font-size: 1.5rem; font-weight: 700; color: #fff; }
    .price-original { font-size: 0.9rem; color: var(--text-muted); text-decoration: line-through; }
    .discount { color: #43e97b; font-size: 0.85rem; font-weight: 600; margin-left: 5px; }

    .buy-btn {
      background: #fff; color: #000;
      text-decoration: none; padding: 0.8rem 2rem;
      border-radius: 12px; font-weight: 700;
      display: flex; align-items: center; gap: 10px;
      transition: 0.2s;
    }
    .buy-btn:hover { background: #e0e0e0; transform: translateY(-2px); }

    #loading { text-align: center; margin-top: 100px; color: var(--text-muted); font-family: 'DM Mono', monospace; }
  </style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">QUIZABLE<span>.</span></a>
</nav>

<div class="container" id="course-container">
  <div id="loading">Syncing with partner database...</div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = { apiKey: "AIzaSyBsMWa4Tup5nj6Xh5ev3FLiftGjWZGwukk", authDomain: "sigmascore300.firebaseapp.com", projectId: "sigmascore300" };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  async function loadPartnerCourses() {
    const urlParams = new URLSearchParams(window.location.search);
    const targetExam = urlParams.get('exam') || 'JEE Main';
    
    const container = document.getElementById('course-container');

    try {
      const q = query(collection(db, "courses"), where("examTag", "==", targetExam));
      const snap = await getDocs(q);
      
      container.innerHTML = ''; // Clear loading

      snap.forEach(doc => {
        const data = doc.data();
        
        // Creating the card structure similar to your screenshot
        container.innerHTML += `
          <div class="course-card">
            <div class="banner-wrapper">
              <img src="${data.thumbnail || 'https://via.placeholder.com/800x450'}" class="banner-img">
            </div>
            
            <div class="course-info">
              <div class="tag-row">
                <span class="category-tag">Class 12 JEE</span>
                <span class="lang-badge">Hinglish</span>
              </div>
              
              <h2 class="title">${data.title}</h2>
              
              <div class="meta-list">
                <div class="meta-item"><span>📖</span> ${data.examTag} 2027</div>
                <div class="meta-item"><span>📅</span> Syllabus starts on 6 Apr'26</div>
                <div class="meta-item"><span>🏫</span> Partner: ${data.institute || 'Direct'}</div>
              </div>
              
              <div class="footer-row">
                <div class="price-block">
                  <div>
                    <span class="price-current">₹4999</span>
                    <span class="price-original">₹6000</span>
                    <span class="discount">17% OFF</span>
                  </div>
                </div>
                
                <a href="${data.redirectUrl}" target="_blank" class="buy-btn">
                  Explore Now <span>→</span>
                </a>
              </div>
            </div>
          </div>
        `;
      });
    } catch (e) {
      console.error(e);
      container.innerHTML = 'Error loading courses.';
    }
  }

  loadPartnerCourses();
</script>

</body>
</html>
