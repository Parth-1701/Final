<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quizable — Course Catalog</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@400;500&family=DM+Mono:wght@500&display=swap" rel="stylesheet"/>
  <style>
    :root { --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a26; --border: #2a2a3d; --accent: #6c63ff; --text: #e8e8f0; --text-muted: #6b6b8a; --text-dim: #9999b8; }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
    
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; gap: 1rem; padding: 0 2.5rem; height: 64px; background: rgba(10, 10, 15, 0.85); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
    .nav-logo { font-family: 'Syne', sans-serif; font-size: 1.3rem; font-weight: 700; color: var(--text); text-decoration: none; }
    .nav-logo span { color: var(--accent); }
    .nav-back { color: var(--text-dim); text-decoration: none; font-size: 0.875rem; font-weight: 500; transition: 0.2s; }
    .nav-back:hover { color: var(--accent); }

    .page-wrapper { padding: 120px 2rem 4rem; max-width: 1000px; margin: 0 auto; flex: 1; width: 100%; }
    .page-title { font-family: 'Syne', sans-serif; font-size: 2.5rem; font-weight: 700; margin-bottom: 0.5rem; }
    .page-sub { color: var(--text-dim); margin-bottom: 3rem; font-size: 1.1rem; }

    .course-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
    .course-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; display: flex; flex-direction: column; text-decoration: none; color: var(--text); transition: all 0.2s; cursor: pointer; }
    .course-card:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 10px 30px rgba(108,99,255,0.1); }
    
    .course-type { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--accent); text-transform: uppercase; margin-bottom: 0.5rem; letter-spacing: 0.05em; }
    .course-title { font-family: 'Syne', sans-serif; font-size: 1.25rem; font-weight: 700; margin-bottom: 0.8rem; }
    .course-desc { font-size: 0.9rem; color: var(--text-dim); line-height: 1.5; margin-bottom: 1.5rem; flex: 1; }
    
    .course-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); padding-top: 1rem; }
    .lock-premium { color: #ffd700; font-size: 0.85rem; font-weight: 600; display: flex; align-items: center; gap: 0.4rem; }
    .lock-free { color: #43e97b; font-size: 0.85rem; font-weight: 600; }
    .start-btn { color: var(--accent); font-size: 0.9rem; font-weight: 600; }
    
    #loading { text-align: center; color: var(--text-muted); font-family: 'DM Mono', monospace; padding: 3rem; }
    #no-courses { text-align: center; color: var(--text-muted); padding: 3rem; display: none; background: var(--surface); border-radius: 12px; border: 1px dashed var(--border); }
  </style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">Quizable<span>.</span></a>
  <div style="height: 20px; width: 1px; background: var(--border); margin: 0 10px;"></div>
  <a href="/courses" class="nav-back">← Back to Directory</a>
</nav>

<div class="page-wrapper">
  <h1 class="page-title" id="display-exam">Loading Catalog...</h1>
  <p class="page-sub">Select a masterclass to begin learning.</p>

  <div id="loading">Fetching courses from server...</div>
  <div id="no-courses">No courses found for this category yet. Check back later!</div>
  
  <div class="course-grid" id="course-container">
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = { apiKey: "AIzaSyBsMWa4Tup5nj6Xh5ev3FLiftGjWZGwukk", authDomain: "sigmascore300.firebaseapp.com", projectId: "sigmascore300" };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  async function fetchCourses() {
    const urlParams = new URLSearchParams(window.location.search);
    const targetExam = urlParams.get('exam') || 'All';
    document.getElementById('display-exam').textContent = targetExam === 'All' ? 'Foundation Courses' : `${targetExam} Masterclasses`;

    const container = document.getElementById('course-container');
    const loading = document.getElementById('loading');
    const noCourses = document.getElementById('no-courses');

    try {
      // Query Firebase for courses matching the exam tag
      const q = query(collection(db, "courses"), where("examTag", "==", targetExam));
      const querySnapshot = await getDocs(q);

      loading.style.display = 'none';

      if (querySnapshot.empty) {
        noCourses.style.display = 'block';
        return;
      }

      querySnapshot.forEach((doc) => {
        const data = doc.data();
        const accessBadge = data.isPremium 
          ? `<div class="lock-premium">🔒 Platinum</div>` 
          : `<div class="lock-free">Free Access</div>`;

        // Create the card and link to the viewer page passing the document ID!
        container.innerHTML += `
          <a href="/course-view.html?id=${doc.id}" class="course-card">
            <div class="course-type">${data.courseType || 'Course'}</div>
            <h3 class="course-title">${data.title}</h3>
            <p class="course-desc">${data.description}</p>
            <div class="course-footer">
              ${accessBadge}
              <div class="start-btn">Watch Now →</div>
            </div>
          </a>
        `;
      });
    } catch (error) {
      console.error("Error fetching courses:", error);
      loading.textContent = "Error loading courses. Please try again.";
    }
  }

  fetchCourses();
</script>
</body>
</html>
