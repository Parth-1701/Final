<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quizable — Course Directory</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root { --bg: #0a0a0f; --surface: #12121a; --border: #2a2a3d; --accent: #6c63ff; --text: #e8e8f0; --text-dim: #9999b8; }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }

    /* ── PARTNER BANNER ── */
    .partner-banner { 
      background: linear-gradient(90deg, rgba(108,99,255,0.1), transparent);
      border: 1px solid var(--border); border-radius: 12px;
      padding: 1.5rem 2rem; margin-bottom: 3rem; display: flex; align-items: center; justify-content: space-between;
      animation: fadeUp 0.6s ease both;
    }
    .partner-info h4 { font-family: 'Syne', sans-serif; font-size: 1.1rem; margin-bottom: 0.2rem; }
    .partner-info p { font-size: 0.85rem; color: var(--text-dim); }
    .partner-logos { display: flex; align-items: center; gap: 1rem; opacity: 0.8; }
    .partner-logos img { height: 30px; filter: grayscale(1) brightness(2); }

    /* ── NAV & LAYOUT (Simplified for brevity) ── */
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 0 2.5rem; height: 64px; background: rgba(10, 10, 15, 0.85); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
    .page-wrapper { padding: 120px 2rem 4rem; max-width: 1100px; margin: 0 auto; width: 100%; }
    .page-title { font-family: 'Syne', sans-serif; font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 800; margin-bottom: 3rem; text-align: center; }

/* The Grid Container */
.exam-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 1.5rem;
  margin-top: 2rem;
}

/* The Course Card Layout */
.exam-card {
  background: var(--surface); /* Your dark card background */
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.2rem;
  text-decoration: none;
  transition: all 0.3s ease;
  
  /* Flexbox makes the image and text sit side-by-side */
  display: flex;
  align-items: center; 
  gap: 1.2rem;
}

.exam-card:hover {
  transform: translateY(-4px);
  border-color: var(--accent); /* Your purple or gold accent color */
  box-shadow: 0 8px 24px rgba(0,0,0,0.2);
}

/* The SMALL 1:1 Image */
.exam-thumb {
  width: 70px; /* Kept small! */
  height: 70px; /* Forces the 1:1 square */
  object-fit: contain; 
  border-radius: 10px;
  background: var(--surface2); /* Nice backdrop for transparent logos */
  padding: 0.3rem; /* Gives the image a little breathing room inside the square */
  flex-shrink: 0; /* Prevents the image from squishing if the text gets long */
}

/* Text Container */
.exam-info {
  display: flex;
  flex-direction: column;
  text-align: left;
}

.exam-title {
  font-family: 'Syne', sans-serif;
  font-size: 1.1rem;
  font-weight: 700;
  color: #fff;
  margin: 0 0 0.3rem 0;
}

.exam-subtitle {
  font-size: 0.85rem;
  color: var(--text-dim);
  margin: 0;
}
    @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
  </style>
</head>
<body>

<nav>
  <a href="/" style="font-family:'Syne',sans-serif; font-weight:800; text-decoration:none; color:white; font-size:1.3rem;">Quizable<span>.</span></a>
  <a href="/" style="color:var(--text-dim); text-decoration:none; font-size:0.9rem;">← Dashboard</a>
</nav>

<div class="exam-grid">
  
  <a href="/pw" class="exam-card">
    <img src="https://iili.io/BDLklfe.png" alt="JEE Main" class="exam-thumb">
    <div class="exam-info">
      <h3 class="exam-title">Physics Wallah</h3>
      <span class="exam-subtitle"> JEE and NEET</span>
    </div>
  </a>

  <a href="/pwmaha" class="exam-card">
    <img src="https://iili.io/BDiS9iF.jpg" alt="MHT CET" class="exam-thumb">
    <div class="exam-info">
      <h3 class="exam-title">PW Maharashtra</h3>
      <span class="exam-subtitle"> MHT-CET</span>
    </div>
  </a>

    <div class="exam-info">
      <h3 class="exam-title">BITSAT</h3>

</div>
</body>
</html>
