<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quizable | Live Test Interface</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a26; --border: #2a2a3d; 
      --accent: #6c63ff; --green: #3ecf8e; --red: #ff6b6b; --gold: #f6c90e; --text: #e8e8f0; --text-dim: #9999b8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'DM Sans', sans-serif; }
    body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    /* --- TOP BAR --- */
    .top-bar { display: flex; justify-content: space-between; align-items: center; background: var(--surface); padding: 15px 20px; border-bottom: 1px solid var(--border); }
    .exam-title { font-weight: 700; font-size: 1.1rem; color: white; }
    .timer-box { display: flex; align-items: center; gap: 10px; font-family: 'DM Mono', monospace; font-size: 1.2rem; font-weight: bold; color: var(--gold); background: rgba(246, 201, 14, 0.1); padding: 5px 15px; border-radius: 8px; border: 1px solid rgba(246, 201, 14, 0.3); }
    .btn-submit { background: var(--red); color: white; border: none; padding: 8px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; }
    .btn-submit:hover { filter: brightness(1.1); transform: translateY(-1px); }

    /* --- MAIN LAYOUT --- */
    .main-area { display: flex; flex: 1; overflow: hidden; position: relative; }
    
    /* --- LEFT: EXAM PANEL --- */
    .left-panel { flex: 1; display: flex; flex-direction: column; border-right: 1px solid var(--border); position: relative; }
    
    /* Subject Tabs */
    .subject-bar { display: flex; background: var(--surface2); border-bottom: 1px solid var(--border); overflow-x: auto; }
    .sub-tab { padding: 12px 25px; font-weight: bold; cursor: pointer; border-right: 1px solid var(--border); color: var(--text-dim); white-space: nowrap; transition: 0.2s; }
    .sub-tab.active { background: var(--surface); color: var(--accent); border-top: 3px solid var(--accent); }
    
    /* Question Scrolling Area */
    .q-content { flex: 1; overflow-y: auto; padding: 30px; }
    .q-header { display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); padding-bottom: 15px; margin-bottom: 20px; color: var(--text-dim); }
    .q-text { font-size: 1.15rem; line-height: 1.6; margin-bottom: 30px; }
    .exam-img { max-width: 100%; height: auto; border-radius: 6px; margin-top: 10px; display: block; }
    
    /* Options */
    .options-grid { display: flex; flex-direction: column; gap: 12px; }
    .option-row { display: flex; align-items: center; gap: 15px; background: var(--surface2); padding: 15px; border-radius: 8px; border: 1px solid var(--border); cursor: pointer; transition: 0.2s; }
    .option-row:hover { border-color: var(--accent); }
    .option-row.selected { background: rgba(108,99,255,0.15); border-color: var(--accent); }
    .opt-label { width: 30px; height: 30px; border-radius: 6px; background: var(--surface); display: flex; align-items: center; justify-content: center; font-weight: bold; border: 1px solid var(--border); }
    .option-row.selected .opt-label { background: var(--accent); color: white; border-color: var(--accent); }

    /* GLUED BOTTOM NAV BAR */
    .bottom-bar { display: flex; flex-wrap: wrap; justify-content: space-between; gap: 10px; padding: 15px 30px; background: var(--surface); border-top: 1px solid var(--border); }
    .nav-buttons-right { display: flex; flex-wrap: wrap; gap: 10px; }
    .btn { padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; font-size: 0.95rem; white-space: nowrap; transition: 0.2s; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-outline:hover { background: var(--surface2); }
    .btn-review { background: rgba(246, 201, 14, 0.15); color: var(--gold); border: 1px solid rgba(246,201,14,0.3); }
    .btn-review:hover { background: rgba(246, 201, 14, 0.25); }
    .btn-next { background: var(--green); color: black; }
    .btn-next:hover { filter: brightness(1.1); }

    /* --- RIGHT: SIDEBAR PALETTE --- */
    .sidebar { width: 320px; background: var(--surface); display: flex; flex-direction: column; transition: transform 0.3s ease; }
    .sidebar-header { padding: 15px; border-bottom: 1px solid var(--border); font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
    
    .palette-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; padding: 20px; overflow-y: auto; align-content: flex-start; }
    .pal-btn { aspect-ratio: 1; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-family: 'DM Mono'; font-weight: bold; cursor: pointer; border: 1px solid transparent; background: var(--surface2); color: var(--text-dim); }
    
    /* Status Colors */
    .pal-btn.answered { background: rgba(62,207,142,0.15); border-color: var(--green); color: var(--green); }
    .pal-btn.skipped { background: rgba(255,107,107,0.15); border-color: var(--red); color: var(--red); }
    .pal-btn.review { background: rgba(246, 201, 14, 0.15); border-color: var(--gold); color: var(--gold); }
    .pal-btn.active { border-color: white; color: white; border-width: 2px; }

    .legend { padding: 20px; border-top: 1px solid var(--border); font-size: 0.85rem; color: var(--text-dim); display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: auto; }
    .leg-item { display: flex; align-items: center; gap: 8px; }
    .leg-dot { width: 12px; height: 12px; border-radius: 3px; }

    /* Mobile Toggle Arrow */
    .toggle-arrow { display: none; position: absolute; right: 20px; bottom: 80px; width: 50px; height: 50px; border-radius: 25px; background: var(--accent); color: white; border: none; font-size: 1.2rem; cursor: pointer; z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }

    /* Full Page Loader */
    #loader { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; flex-direction: column; gap: 15px; }
    .spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Mobile Responsiveness */
    @media (max-width: 900px) {
      .sidebar { position: absolute; right: 0; top: 0; bottom: 0; transform: translateX(100%); z-index: 50; }
      .sidebar.open { transform: translateX(0); }
      .toggle-arrow { display: flex; align-items: center; justify-content: center; }
      .bottom-bar { flex-direction: column; padding: 15px; }
      .nav-buttons-right { width: 100%; }
      .btn { flex: 1; text-align: center; padding: 10px; }
    }
  </style>
</head>
<body>

  <div id="loader">
    <div class="spinner"></div>
    <div style="font-family: 'DM Mono'; color: var(--text-dim);" id="load-text">Preparing Examination Engine...</div>
  </div>

  <div class="top-bar">
    <div class="exam-title" id="display-title">Quizable NTA Interface</div>
    <div class="timer-box" id="timer">--:--:--</div>
    <button class="btn-submit" onclick="window.submitExam()">Submit Test</button>
  </div>

  <div class="main-area">
    <div class="left-panel">
      <div class="subject-bar" id="subject-bar"></div>
      <div class="q-content" id="q-scroll-area">
        <div class="q-header">
          <span id="q-subject-name" style="color: var(--accent); font-weight: bold; text-transform: uppercase; letter-spacing: 1px;">Loading...</span>
          <span id="q-number">Question 1</span>
        </div>
        <div class="q-text" id="q-text">Loading question text...</div>
        <div class="options-grid" id="options-container"></div>
      </div>
      <div class="bottom-bar">
        <button class="btn btn-outline" onclick="window.navigate(-1)">← Previous</button>
        <div class="nav-buttons-right">
          <button class="btn btn-outline" onclick="window.clearSelection()">Clear</button>
          <button class="btn btn-review" onclick="window.markForReview()">Mark for Review</button>
          <button class="btn btn-next" onclick="window.saveAndNext()">Save & Next →</button>
        </div>
      </div>
    </div>

    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        Question Palette
        <button class="btn-outline" style="padding: 2px 8px; border: none;" onclick="window.toggleSidebar()">✕</button>
      </div>
      <div class="palette-grid" id="palette-grid"></div>
      <div class="legend">
        <div class="leg-item"><div class="leg-dot" style="background: rgba(62,207,142,0.5);"></div> Answered</div>
        <div class="leg-item"><div class="leg-dot" style="background: rgba(255,107,107,0.5);"></div> Skipped</div>
        <div class="leg-item"><div class="leg-dot" style="background: rgba(246, 201, 14, 0.5);"></div> Review</div>
        <div class="leg-item"><div class="leg-dot" style="background: var(--surface2);"></div> Unvisited</div>
      </div>
    </div>
    
    <button class="toggle-arrow" id="toggle-btn" onclick="window.toggleSidebar()">◀</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBsMWa4Tup5nj6Xh5ev3FLiftGjWZGwukk",
      authDomain: "sigmascore300.firebaseapp.com",
      projectId: "sigmascore300",
      storageBucket: "sigmascore300.firebasestorage.app",
      messagingSenderId: "293195338803",
      appId: "1:293195338803:web:b2a45a3b48a378dd99ff46",
      measurementId: "G-MLZYWG2EEM"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let testData = null;
    let questions = [];
    let responses = []; 
    let timeRemaining = 0;
    let timerInterval = null;

    let currentGlobalIdx = 0;
    let sections = [];
    let currentSection = "";

    onAuthStateChanged(auth, async (user) => {
      if (!user) { alert("You must be logged in!"); window.location.href = 'index.html'; return; }

      const params = new URLSearchParams(window.location.search);
      const testId = params.get('testId');
      if (!testId) { window.location.href = 'index.html'; return; }

      try {
        const testSnap = await getDoc(doc(db, 'tests', testId));
        if (!testSnap.exists()) throw new Error("Test not found.");
        testData = testSnap.data();
        testData.id = testId;

        // Security Check
        if (testData.isPremium === true || testData.isPremium === "true") {
          const userSnap = await getDoc(doc(db, 'users', user.uid));
          const pkgs = (userSnap.data() || {}).purchasedPackages || [];
          if (!pkgs.includes(testData.examType)) {
            alert("🔒 Access Denied."); window.location.href = 'index.html'; return;
          }
        }

        document.getElementById('display-title').innerText = testData.title || "Mock Test";
        timeRemaining = (testData.duration_minutes || 180) * 60;
        
        questions = testData.questions || [];
        if (questions.length === 0) {
          questions = [
            { id: 1, section: "Physics", text: "Unit of Force?", options: { A: "Joule", B: "Newton", C: "Watt", D: "Pascal" }, answer: "B" },
            { id: 2, section: "Chemistry", text: "Formula of Water?", options: { A: "H2O", B: "CO2", C: "O2", D: "NaCl" }, answer: "A" }
          ];
        }

        responses = questions.map(() => ({ ans: null, status: 'unvisited' }));
        sections = [...new Set(questions.map(q => q.subject || q.section || "General"))];
        currentSection = sections[0];

        window.buildSectionTabs();
        window.buildPalette();
        window.loadQuestion(0);
        startTimer();
        document.getElementById('loader').style.display = 'none';

      } catch (err) {
        console.error(err);
        document.getElementById('load-text').innerText = "Error loading test. Missing data.";
        document.getElementById('load-text').style.color = "var(--red)";
      }
    });

    window.buildSectionTabs = () => {
      const bar = document.getElementById('subject-bar');
      bar.innerHTML = '';
      sections.forEach(sec => {
        bar.innerHTML += `<div class="sub-tab ${sec === currentSection ? 'active' : ''}" onclick="window.switchSection('${sec}')">${sec}</div>`;
      });
    };

    window.switchSection = (secName) => {
      currentSection = secName;
      window.buildSectionTabs();
      const firstIdx = questions.findIndex(q => (q.subject || q.section || "General") === currentSection);
      if (firstIdx !== -1) {
        window.buildPalette();
        window.loadQuestion(firstIdx);
      }
    };

    window.loadQuestion = (globalIndex) => {
      if (globalIndex < 0 || globalIndex >= questions.length) return;
      currentGlobalIdx = globalIndex;
      const q = questions[currentGlobalIdx];
      const qSec = q.subject || q.section || "General";

      if (currentSection !== qSec) {
        currentSection = qSec;
        window.buildSectionTabs();
        window.buildPalette();
      }

      if (responses[currentGlobalIdx].status === 'unvisited') {
        responses[currentGlobalIdx].status = 'skipped';
      }

      let localNum = 1;
      for (let i = 0; i < currentGlobalIdx; i++) {
        if ((questions[i].subject || questions[i].section || "General") === currentSection) localNum++;
      }

      document.getElementById('q-number').innerText = `Question ${localNum}`;
      document.getElementById('q-subject-name').innerText = currentSection;
      document.getElementById('q-text').innerHTML = q.text || q.question;

      const optsContainer = document.getElementById('options-container');
      optsContainer.innerHTML = '';
      const options = q.options || { A: "Opt 1", B: "Opt 2", C: "Opt 3", D: "Opt 4" };
      for (const [key, val] of Object.entries(options)) {
        const isSelected = responses[currentGlobalIdx].ans === key;
        optsContainer.innerHTML += `
          <div class="option-row ${isSelected ? 'selected' : ''}" onclick="window.selectOption('${key}')">
            <div class="opt-label">${key}</div>
            <div style="flex: 1;">${val}</div>
          </div>
        `;
      }
      document.getElementById('q-scroll-area').scrollTop = 0;
      window.updatePaletteUI();
    };

    window.selectOption = (key) => {
      if (responses[currentGlobalIdx].ans === key) {
        responses[currentGlobalIdx].ans = null;
        responses[currentGlobalIdx].status = 'skipped';
      } else {
        responses[currentGlobalIdx].ans = key;
        responses[currentGlobalIdx].status = 'answered';
      }
      window.loadQuestion(currentGlobalIdx); 
    };

    window.clearSelection = () => {
      responses[currentGlobalIdx].ans = null;
      responses[currentGlobalIdx].status = 'skipped';
      window.loadQuestion(currentGlobalIdx);
    };

    window.navigate = (dir) => window.loadQuestion(currentGlobalIdx + dir);

    window.saveAndNext = () => {
      if (responses[currentGlobalIdx].ans) responses[currentGlobalIdx].status = 'answered';
      else responses[currentGlobalIdx].status = 'skipped';
      if (currentGlobalIdx < questions.length - 1) window.loadQuestion(currentGlobalIdx + 1);
      else window.updatePaletteUI();
    };

    window.markForReview = () => {
      responses[currentGlobalIdx].status = 'review';
      if (currentGlobalIdx < questions.length - 1) window.loadQuestion(currentGlobalIdx + 1);
      else window.updatePaletteUI();
    };

    window.buildPalette = () => {
      const grid = document.getElementById('palette-grid');
      grid.innerHTML = '';
      let localNum = 1;
      questions.forEach((q, index) => {
        if ((q.subject || q.section || "General") === currentSection) {
          grid.innerHTML += `<div class="pal-btn" id="pal-${index}" onclick="window.loadQuestion(${index})">${localNum}</div>`;
          localNum++;
        }
      });
      window.updatePaletteUI();
    };

    window.updatePaletteUI = () => {
      questions.forEach((q, index) => {
        if ((q.subject || q.section || "General") === currentSection) {
          const btn = document.getElementById(`pal-${index}`);
          if (btn) {
            btn.className = `pal-btn ${responses[index].status}`;
            if (index === currentGlobalIdx) btn.classList.add('active');
          }
        }
      });
    };

    window.toggleSidebar = () => {
      const sidebar = document.getElementById('sidebar');
      const arrow = document.getElementById('toggle-btn');
      sidebar.classList.toggle('open');
      arrow.innerText = sidebar.classList.contains('open') ? '▶' : '◀';
    };

    function startTimer() {
      const display = document.getElementById('timer');
      timerInterval = setInterval(() => {
        timeRemaining--;
        if (timeRemaining <= 0) { clearInterval(timerInterval); window.submitExam(); return; }
        let h = Math.floor(timeRemaining / 3600);
        let m = Math.floor((timeRemaining % 3600) / 60);
        let s = timeRemaining % 60;
        display.innerText = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
      }, 1000);
    }

    window.submitExam = async () => {
      const conf = confirm("Are you sure you want to submit?");
      if (!conf && timeRemaining > 0) return;
      clearInterval(timerInterval);
      document.getElementById('loader').style.display = 'flex';
      document.getElementById('load-text').innerText = "Scoring Exam...";
      
      let score = 0, correct = 0, wrong = 0, unattempted = 0;
      const isCET = testData.examType === 'mht_cet';
      
      for (let i = 0; i < questions.length; i++) {
        const q = questions[i];
        if (!responses[i].ans) {
          unattempted++;
        } else if (responses[i].ans === q.answer) { 
          correct++; 
          if (isCET) { score += (q.subject === 'Mathematics' || q.section === 'Mathematics') ? 2 : 1; } 
          else { score += 4; }
        } else { 
          wrong++; 
          score -= isCET ? 0 : 1; 
        }
      }

      try {
        // Safe Time Calculation
        const totalDurationSeconds = (testData.duration_minutes || 180) * 60;
        const timeTaken = totalDurationSeconds - timeRemaining;
        const testTitle = testData.title || testData.name || "Mock Test";

        sessionStorage.setItem('examResult', JSON.stringify({
          score, correct, wrong, unattempted, timeTaken, totalQuestions: questions.length, 
          testId: testData.id, examType: testData.examType || "JEE", testTitle
        }));

        const user = auth.currentUser;
        if (user) {
          await addDoc(collection(db, 'results'), {
            userId: user.uid, testId: testData.id, testTitle: testTitle,
            score, correct, wrong, timeTaken, submittedAt: serverTimestamp()
          }).catch(e => console.log(e));
        }
        window.location.href = 'result.html';
      } catch (err) {
        alert("Error saving."); document.getElementById('loader').style.display = 'none';
      }
    };
  </script>
</body>
</html>
