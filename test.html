<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quizable | Mock Test Interface</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    /* NTA Dark Theme Variables */
    :root {
      --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a26; --border: #2a2a3d; 
      --accent: #6c63ff; --text: #e8e8f0; --text-dim: #9999b8;
      
      /* NTA Standard Palette Colors */
      --nta-save: #28a745;       /* Green */
      --nta-review: #fd7e14;     /* Orange */
      --nta-clear: #6c757d;      /* Gray/White */
      --nta-skipped: #dc3545;    /* Red */
      --nta-unvisited: #f8f9fa;  /* White */
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Roboto', sans-serif; }
    body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    /* --- TOP BAR --- */
    .top-bar { display: flex; justify-content: space-between; align-items: center; background: #000; padding: 15px 25px; border-bottom: 2px solid var(--border); }
    .exam-title { font-weight: 700; font-size: 1.2rem; color: white; letter-spacing: 1px; }
    .timer-box { font-family: 'DM Mono', monospace; font-size: 1.4rem; font-weight: bold; color: var(--nta-review); display: flex; align-items: center; gap: 10px; }
    .btn-submit { background: var(--nta-skipped); color: white; border: none; padding: 10px 25px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.2s; }
    .btn-submit:hover { filter: brightness(1.2); }

    /* --- MAIN LAYOUT --- */
    .main-area { display: flex; flex: 1; overflow: hidden; position: relative; }
    
    /* --- LEFT: QUESTION PANEL --- */
    .left-panel { flex: 1; display: flex; flex-direction: column; border-right: 1px solid var(--border); position: relative; }
    
    /* Subject Tabs */
    .subject-bar { display: flex; background: var(--surface2); border-bottom: 1px solid var(--border); overflow-x: auto; }
    .sub-tab { padding: 15px 30px; font-weight: bold; cursor: pointer; border-right: 1px solid var(--border); color: var(--text-dim); white-space: nowrap; transition: 0.2s; text-transform: uppercase; font-size: 0.9rem; }
    .sub-tab.active { background: var(--surface); color: white; border-top: 3px solid var(--accent); }
    
    /* Scrolling Question Area */
    .q-content { flex: 1; overflow-y: auto; padding: 40px; }
    .q-header { display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); padding-bottom: 15px; margin-bottom: 25px; color: var(--text-dim); font-size: 1.1rem; }
    .q-text { font-size: 1.2rem; line-height: 1.6; margin-bottom: 30px; font-weight: 500; }
    .exam-img { max-width: 100%; height: auto; border-radius: 4px; margin-top: 15px; border: 1px solid var(--border); }
    
    /* Options & Inputs */
    .options-grid { display: flex; flex-direction: column; gap: 15px; }
    .option-row { display: flex; align-items: center; gap: 15px; background: var(--surface2); padding: 15px 20px; border-radius: 6px; border: 2px solid var(--border); cursor: pointer; transition: 0.2s; font-size: 1.1rem; }
    .option-row:hover { border-color: var(--text-dim); }
    .option-row.selected { background: rgba(40, 167, 69, 0.1); border-color: var(--nta-save); }
    .opt-label { width: 35px; height: 35px; border-radius: 50%; background: var(--surface); display: flex; align-items: center; justify-content: center; font-weight: bold; border: 1px solid var(--border); }
    .option-row.selected .opt-label { background: var(--nta-save); color: white; border-color: var(--nta-save); }

    .numerical-input { width: 100%; max-width: 400px; padding: 20px; background: var(--surface2); border: 2px solid var(--border); color: white; border-radius: 6px; font-size: 1.5rem; font-family: 'DM Mono', monospace; outline: none; transition: 0.2s; }
    .numerical-input:focus { border-color: var(--nta-save); background: rgba(40, 167, 69, 0.05); }

    /* NTA GLUED BOTTOM NAV BAR */
    .bottom-bar { display: flex; justify-content: space-between; padding: 20px 40px; background: var(--surface); border-top: 2px solid var(--border); gap: 15px; }
    .nav-group { display: flex; gap: 15px; flex-wrap: wrap; }
    .btn { padding: 12px 25px; border-radius: 4px; font-weight: bold; cursor: pointer; border: 1px solid transparent; font-size: 1rem; text-transform: uppercase; letter-spacing: 0.5px; transition: 0.2s; white-space: nowrap; }
    
    .btn-clear { background: var(--surface2); color: white; border-color: var(--border); }
    .btn-clear:hover { background: #2a2a3d; }
    
    .btn-review { background: var(--nta-review); color: white; }
    .btn-review:hover { filter: brightness(1.1); }
    
    .btn-save { background: var(--nta-save); color: white; }
    .btn-save:hover { filter: brightness(1.1); }

    /* --- RIGHT: PALETTE SIDEBAR --- */
    .sidebar { width: 340px; background: var(--surface2); display: flex; flex-direction: column; transition: transform 0.3s ease; }
    .sidebar-header { padding: 20px; background: var(--surface); border-bottom: 1px solid var(--border); font-weight: bold; text-align: center; font-size: 1.1rem; }
    
    /* Stats Box */
    .palette-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 20px; border-bottom: 1px solid var(--border); font-size: 0.85rem; font-weight: bold; }
    .stat-item { display: flex; align-items: center; gap: 8px; }
    .stat-badge { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; border-radius: 4px; color: white; font-family: 'DM Mono'; font-size: 0.75rem; }

    .palette-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 20px; overflow-y: auto; align-content: flex-start; }
    .pal-btn { aspect-ratio: 1; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-family: 'DM Mono'; font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: 0.1s; }
    
    /* NTA Status Colors */
    .pal-btn.unvisited { background: var(--nta-unvisited); color: black; border: 1px solid #ccc; }
    .pal-btn.skipped { background: var(--nta-skipped); color: white; border: none; border-bottom-left-radius: 12px; border-bottom-right-radius: 12px; }
    .pal-btn.answered { background: var(--nta-save); color: white; border: none; border-top-left-radius: 12px; border-top-right-radius: 12px; }
    .pal-btn.review { background: var(--nta-review); color: white; border: none; border-radius: 50%; }
    .pal-btn.answered-review { background: var(--nta-review); color: white; border: none; border-radius: 50%; position: relative; }
    .pal-btn.answered-review::after { content: ''; position: absolute; bottom: 2px; right: 2px; width: 8px; height: 8px; background: var(--nta-save); border-radius: 50%; border: 1px solid white; }
    
    .pal-btn.active { outline: 3px solid white; outline-offset: 2px; transform: scale(1.1); z-index: 10; }

    /* Full Page Loader */
    #loader { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; flex-direction: column; gap: 20px; }
    .spinner { width: 50px; height: 50px; border: 5px solid var(--surface2); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Mobile Toggle */
    .toggle-arrow { display: none; position: absolute; right: 20px; bottom: 100px; width: 50px; height: 50px; border-radius: 25px; background: var(--accent); color: white; border: none; font-size: 1.2rem; cursor: pointer; z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }

    @media (max-width: 1000px) {
      .sidebar { position: absolute; right: 0; top: 0; bottom: 0; transform: translateX(100%); z-index: 50; }
      .sidebar.open { transform: translateX(0); }
      .toggle-arrow { display: flex; align-items: center; justify-content: center; }
      .bottom-bar { flex-direction: column; padding: 15px; }
      .nav-group { width: 100%; display: grid; grid-template-columns: 1fr 1fr; }
      .btn-save { grid-column: 1 / -1; } /* Save button takes full width on bottom */
    }
  </style>
</head>
<body>

  <div id="loader">
    <div class="spinner"></div>
    <div style="font-family: 'DM Mono'; font-size: 1.2rem;" id="load-text">Loading Examination Environment...</div>
  </div>

  <div class="top-bar">
    <div class="exam-title" id="display-title">Quizable NTA Engine</div>
    <div class="timer-box">⏱ <span id="timer">--:--:--</span></div>
    <button class="btn-submit" onclick="window.submitExam()">Submit Exam</button>
  </div>

  <div class="main-area">
    
    <div class="left-panel">
      <div class="subject-bar" id="subject-bar"></div>

      <div class="q-content" id="q-scroll-area">
        <div class="q-header">
          <span id="q-subject-name" style="font-weight: bold; color: white;">Loading...</span>
          <span id="q-number" style="color: var(--nta-save); font-weight: bold;">Q. 1</span>
        </div>
        
        <div class="q-text" id="q-text">Loading question text...</div>
        <div class="options-grid" id="options-container"></div>
      </div>

      <div class="bottom-bar">
        <button class="btn btn-clear" onclick="window.clearSelection()">Clear Response</button>
        <div class="nav-group">
          <button class="btn btn-review" onclick="window.markForReview()">Mark for Review & Next</button>
          <button class="btn btn-save" onclick="window.saveAndNext()">Save & Next</button>
        </div>
      </div>
    </div>

    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">Question Palette</div>
      
      <div class="palette-stats">
        <div class="stat-item"><div class="stat-badge" style="background: var(--nta-save); border-top-left-radius: 12px; border-top-right-radius: 12px;"></div> Answered</div>
        <div class="stat-item"><div class="stat-badge" style="background: var(--nta-skipped); border-bottom-left-radius: 12px; border-bottom-right-radius: 12px;"></div> Not Answered</div>
        <div class="stat-item"><div class="stat-badge" style="background: var(--nta-unvisited); color: black;"></div> Not Visited</div>
        <div class="stat-item"><div class="stat-badge" style="background: var(--nta-review); border-radius: 50%;"></div> Marked Review</div>
      </div>

      <div class="palette-grid" id="palette-grid"></div>
    </div>
    
    <button class="toggle-arrow" id="toggle-btn" onclick="window.toggleSidebar()">◀</button>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // ─── 1. PASTE YOUR EXACT FIREBASE CONFIG HERE ─────────────────
    const firebaseConfig = {
    apiKey: "AIzaSyBsMWa4Tup5nj6Xh5ev3FLiftGjWZGwukk",
    authDomain: "sigmascore300.firebaseapp.com",
    projectId: "sigmascore300",
    storageBucket: "sigmascore300.firebasestorage.app",
    messagingSenderId: "293195338803",
    appId: "1:293195338803:web:b2a45a3b48a378dd99ff46",
    measurementId: "G-MLZYWG2EEM"
    };
    // ──────────────────────────────────────────────────────────────

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let testData = null;
    let questions = [];
    let responses = []; 
    let timeRemaining = 0;
    let timerInterval = null;

    let currentGlobalIdx = 0;
    let sections = [];
    let currentSection = "";

    // STARTUP
    onAuthStateChanged(auth, async (user) => {
      if (!user) { alert("Please log in!"); window.location.href = 'index.html'; return; }

      const params = new URLSearchParams(window.location.search);
      const testId = params.get('testId');
      if (!testId) { window.location.href = 'index.html'; return; }

      try {
        const testSnap = await getDoc(doc(db, 'tests', testId));
        if (!testSnap.exists()) throw new Error("Test not found.");
        testData = testSnap.data();
        testData.id = testId;

        document.getElementById('display-title').innerText = testData.title || "NTA Mock Test";
        timeRemaining = (testData.duration_minutes || 180) * 60;
        
        questions = testData.questions || [];
        
        // Map Responses mapping to NTA statuses
        responses = questions.map(() => ({ ans: null, status: 'unvisited' }));
        sections = [...new Set(questions.map(q => q.subject || q.section || "General"))];
        currentSection = sections[0];

        window.buildSectionTabs();
        window.buildPalette();
        window.loadQuestion(0);
        startTimer();
        document.getElementById('loader').style.display = 'none';

      } catch (err) {
        console.error(err);
        document.getElementById('load-text').innerText = "Fatal Error Loading Database.";
        document.getElementById('load-text').style.color = "var(--nta-skipped)";
      }
    });

    window.buildSectionTabs = () => {
      const bar = document.getElementById('subject-bar');
      bar.innerHTML = '';
      sections.forEach(sec => {
        bar.innerHTML += `<div class="sub-tab ${sec === currentSection ? 'active' : ''}" onclick="window.switchSection('${sec}')">${sec}</div>`;
      });
    };

    window.switchSection = (secName) => {
      currentSection = secName;
      window.buildSectionTabs();
      const firstIdx = questions.findIndex(q => (q.subject || q.section || "General") === currentSection);
      if (firstIdx !== -1) {
        window.buildPalette();
        window.loadQuestion(firstIdx);
      }
    };

    // LOAD QUESTION ENGINE (Supports Numerical)
    window.loadQuestion = (globalIndex) => {
      if (globalIndex < 0 || globalIndex >= questions.length) return;
      currentGlobalIdx = globalIndex;
      const q = questions[currentGlobalIdx];
      const qSec = q.subject || q.section || "General";

      if (currentSection !== qSec) {
        currentSection = qSec;
        window.buildSectionTabs();
        window.buildPalette();
      }

      // If unvisited, mark as skipped (Not Answered)
      if (responses[currentGlobalIdx].status === 'unvisited') {
        responses[currentGlobalIdx].status = 'skipped';
      }

      let localNum = 1;
      for (let i = 0; i < currentGlobalIdx; i++) {
        if ((questions[i].subject || questions[i].section || "General") === currentSection) localNum++;
      }

      document.getElementById('q-number').innerText = `Question ${localNum}`;
      document.getElementById('q-subject-name').innerText = currentSection;
      
      // Formatting question text
      let qTextHTML = q.text || q.question;
      if(q.type === 'numerical' || !q.options) {
          qTextHTML += `<br><br><span style="color: var(--nta-review); font-size: 0.9rem; font-family: 'DM Mono';">(Numerical Value Type)</span>`;
      }
      document.getElementById('q-text').innerHTML = qTextHTML;

      const optsContainer = document.getElementById('options-container');
      optsContainer.innerHTML = '';
      
      // NUMERICAL ENTRY RENDERER
      if (q.type === 'numerical' || !q.options) {
        const savedVal = responses[currentGlobalIdx].ans || '';
        optsContainer.innerHTML = `
          <input type="number" step="any" class="numerical-input"
                 placeholder="Enter numerical value..." 
                 value="${savedVal}" 
                 oninput="window.saveNumericalAnswer(this.value)">
        `;
      } 
      // STANDARD MCQ RENDERER
      else {
        const options = q.options;
        const sortedKeys = Object.keys(options).sort();
        for (const key of sortedKeys) {
          const val = options[key];
          const isSelected = responses[currentGlobalIdx].ans === key;
          optsContainer.innerHTML += `
            <div class="option-row ${isSelected ? 'selected' : ''}" onclick="window.selectOption('${key}')">
              <div class="opt-label">${key}</div>
              <div style="flex: 1;">${val}</div>
            </div>
          `;
        }
      }

      document.getElementById('q-scroll-area').scrollTop = 0;
      window.updatePaletteUI();
    };

    // ACTION BUTTON LOGIC
    window.selectOption = (key) => {
      responses[currentGlobalIdx].ans = key;
      // NTA Rules: Clicking an option doesn't immediately turn it green. 
      // It turns green when they hit "Save & Next". We'll visually select it here.
      window.loadQuestion(currentGlobalIdx); 
    };

    window.saveNumericalAnswer = (value) => {
      responses[currentGlobalIdx].ans = value.trim() === '' ? null : value.trim();
    };

    window.clearSelection = () => {
      responses[currentGlobalIdx].ans = null;
      responses[currentGlobalIdx].status = 'skipped'; // Returns to Not Answered red
      window.loadQuestion(currentGlobalIdx);
    };

    window.saveAndNext = () => {
      if (responses[currentGlobalIdx].ans) {
        responses[currentGlobalIdx].status = 'answered';
      } else {
        responses[currentGlobalIdx].status = 'skipped';
      }
      if (currentGlobalIdx < questions.length - 1) window.loadQuestion(currentGlobalIdx + 1);
      else window.updatePaletteUI();
    };

    window.markForReview = () => {
      if (responses[currentGlobalIdx].ans) {
        responses[currentGlobalIdx].status = 'answered-review';
      } else {
        responses[currentGlobalIdx].status = 'review';
      }
      if (currentGlobalIdx < questions.length - 1) window.loadQuestion(currentGlobalIdx + 1);
      else window.updatePaletteUI();
    };

    // PALETTE LOGIC
    window.buildPalette = () => {
      const grid = document.getElementById('palette-grid');
      grid.innerHTML = '';
      let localNum = 1;
      questions.forEach((q, index) => {
        if ((q.subject || q.section || "General") === currentSection) {
          grid.innerHTML += `<div class="pal-btn unvisited" id="pal-${index}" onclick="window.loadQuestion(${index})">${localNum}</div>`;
          localNum++;
        }
      });
      window.updatePaletteUI();
    };

    window.updatePaletteUI = () => {
      questions.forEach((q, index) => {
        if ((q.subject || q.section || "General") === currentSection) {
          const btn = document.getElementById(`pal-${index}`);
          if (btn) {
            btn.className = `pal-btn ${responses[index].status}`;
            if (index === currentGlobalIdx) btn.classList.add('active');
          }
        }
      });
    };

    window.toggleSidebar = () => {
      const sidebar = document.getElementById('sidebar');
      const arrow = document.getElementById('toggle-btn');
      sidebar.classList.toggle('open');
      arrow.innerText = sidebar.classList.contains('open') ? '▶' : '◀';
    };

    // TIMER & SUBMISSION (Smart Grading)
    function startTimer() {
      const display = document.getElementById('timer');
      timerInterval = setInterval(() => {
        timeRemaining--;
        if (timeRemaining <= 0) { clearInterval(timerInterval); window.submitExam(); return; }
        let h = Math.floor(timeRemaining / 3600);
        let m = Math.floor((timeRemaining % 3600) / 60);
        let s = timeRemaining % 60;
        display.innerText = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
      }, 1000);
    }

    window.submitExam = async () => {
      const conf = confirm("Are you sure you want to final submit? You will not be able to change your answers.");
      if (!conf && timeRemaining > 0) return;
      clearInterval(timerInterval);
      
      document.getElementById('loader').style.display = 'flex';
      document.getElementById('load-text').innerText = "Processing NTA Scores...";
      
      let score = 0, correct = 0, wrong = 0, unattempted = 0;
      
      for (let i = 0; i < questions.length; i++) {
        const q = questions[i];
        const posMarks = q.positiveMarks !== undefined ? q.positiveMarks : 4;
        const negPenalty = q.negativePenalty !== undefined ? q.negativePenalty : 1;
        
        // Note: NTA considers 'answered' and 'answered-review' for evaluation.
        if (!responses[i].ans || responses[i].status === 'review' || responses[i].status === 'skipped' || responses[i].status === 'unvisited') {
          unattempted++;
        } else {
          // Smart Grading Logic
          let isCorrect = false;
          if (q.type === 'numerical' || !q.options) {
             isCorrect = parseFloat(responses[i].ans) === parseFloat(q.answer);
          } else {
             isCorrect = responses[i].ans === q.answer;
          }

          if (isCorrect) { 
            correct++; 
            score += posMarks; 
          } else { 
            wrong++; 
            score -= negPenalty; 
          }
        }
      }

      try {
        const timeTaken = (testData.duration_minutes * 60) - timeRemaining;
        sessionStorage.setItem('examResult', JSON.stringify({
          score, correct, wrong, unattempted, timeTaken, totalQuestions: questions.length, 
          testId: testData.id, examType: testData.examType || "JEE", testTitle: testData.title
        }));

        const user = auth.currentUser;
        if (user) {
          await addDoc(collection(db, 'results'), {
            userId: user.uid, testId: testData.id, testTitle: testData.title, 
            score, correct, wrong, timeTaken, submittedAt: serverTimestamp()
          }).catch(e => console.log(e));
        }
        window.location.href = 'result.html';
      } catch (err) {
        alert("Network error while saving."); document.getElementById('loader').style.display = 'none';
      }
    };
  </script>
</body>
</html>
