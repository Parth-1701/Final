<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quizable | Test Results</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a26; --border: #2a2a3d; 
      --accent: #6c63ff; --green: #3ecf8e; --red: #ff6b6b; --text: #e8e8f0; --text-dim: #9999b8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'DM Sans', sans-serif; }
    body { background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }

    .result-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 50px; width: 100%; max-width: 600px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); animation: slideUp 0.5s ease-out; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .header-tag { display: inline-block; background: rgba(108,99,255,0.15); color: var(--accent); padding: 5px 15px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; text-transform: uppercase; margin-bottom: 20px; letter-spacing: 1px; border: 1px solid rgba(108,99,255,0.3); }
    
    h1 { font-family: 'Syne', sans-serif; font-size: 2.5rem; margin-bottom: 5px; }
    .score-display { font-family: 'DM Mono', monospace; font-size: 5rem; font-weight: bold; color: white; margin: 20px 0; text-shadow: 0 0 30px rgba(108,99,255,0.4); line-height: 1; }
    
    .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 30px; margin-bottom: 40px; }
    .stat-box { background: var(--surface2); padding: 20px; border-radius: 12px; border: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; }
    .stat-value { font-family: 'DM Mono', monospace; font-size: 1.8rem; font-weight: bold; margin-bottom: 5px; }
    .stat-label { font-size: 0.85rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
    
    .correct { color: var(--green); }
    .wrong { color: var(--red); }
    .neutral { color: var(--accent); }

    .btn { display: inline-block; width: 100%; background: var(--accent); color: white; text-decoration: none; padding: 15px; border-radius: 10px; font-weight: bold; font-size: 1.1rem; transition: 0.2s; border: none; cursor: pointer; }
    .btn:hover { background: #5a52d5; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(108,99,255,0.2); }

    .leaderboard-container {
    background-color: var(--surface); /* Inherits your #12121a */
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    margin-top: 2rem;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
}

.leaderboard-header h2 {
    font-family: 'Syne', sans-serif;
    color: var(--accent); /* Inherits your purple/cyan */
    margin-bottom: 0.2rem;
}

.leaderboard-header p {
    font-size: 0.85rem;
    color: #888;
    margin-bottom: 1.5rem;
}

.leaderboard-table {
    width: 100%;
    border-collapse: collapse;
}

.leaderboard-table th, .leaderboard-table td {
    padding: 1rem;
    text-align: left;
    border-bottom: 1px solid var(--border);
}

.leaderboard-table th {
    text-transform: uppercase;
    font-size: 0.75rem;
    letter-spacing: 1px;
    color: #a0a0b0;
}

/* Gold, Silver, Bronze highlighting for Top 3 */
.rank-1 td { color: #FFD700; font-weight: bold; }
.rank-2 td { color: #C0C0C0; font-weight: bold; }
.rank-3 td { color: #CD7F32; font-weight: bold; }
  </style>
</head>
<body>

  <div class="result-card">
    <div class="header-tag" id="exam-tag">Exam Completed</div>
    <h1>Your Score</h1>
    
    <div class="score-display" id="score-display">--</div>
    
    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-value correct" id="stat-correct">--</div>
        <div class="stat-label">Correct Answers</div>
      </div>
      <div class="stat-box">
        <div class="stat-value wrong" id="wrong-display">--</div>
        <div class="stat-label">Incorrect Answers</div>
      </div>
      <div class="stat-box">
        <div class="stat-value neutral" id="accuracy-display">--%</div>
        <div class="stat-label">Accuracy</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="time-display" style="color: white;">--:--</div>
        <div class="stat-label">Time Taken</div>
      </div>
    </div>

    <div style="display: flex; gap: 15px; width: 100%;">
      <button class="btn" style="background: var(--surface2); color: white; border: 1px solid var(--border);" onclick="window.location.href='index.html'">Dashboard</button>
      <button class="btn" onclick="window.location.href='analysis.html'">View Detailed Analysis →</button>
    </div>
  </div>

  <div class="leaderboard-container">
    <div class="leaderboard-header">
        <h2>🏆 Top Scorers</h2>
        <p>Only your first attempt is ranked.</p>
    </div>
    <table class="leaderboard-table">
        <thead>
            <tr>
                <th>Rank</th>
                <th>Student</th>
                <th>Score</th>
            </tr>
        </thead>
        <tbody id="leaderboard-body">
            <tr><td colspan="3" style="text-align: center;">Loading rankings...</td></tr>
        </tbody>
    </table>
  </div>

  <script type="module">
    // Import Firestore if you are rendering the leaderboard on this page
    import { getFirestore, collection, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

    // Initialize Firebase (Paste your config here again so the leaderboard works)
    const firebaseConfig = {
        apiKey: "AIzaSyBsMWa4Tup5nj6Xh5ev3FLiftGjWZGwukk",
        authDomain: "sigmascore300.firebaseapp.com",
        projectId: "sigmascore300",
        storageBucket: "sigmascore300.firebasestorage.app",
        messagingSenderId: "293195338803",
        appId: "1:293195338803:web:b2a45a3b48a378dd99ff46",
        measurementId: "G-MLZYWG2EEM"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    document.addEventListener("DOMContentLoaded", () => {
        // 1. Pull the data we temporarily saved in the browser during submit
        const resultData = sessionStorage.getItem('examResult');

        if (!resultData) {
            console.error("No test data found in session.");
            document.getElementById('score-display').innerText = "Error";
            return;
        }

        const data = JSON.parse(resultData);

        // 2. Calculate extra stats
        // Prevent dividing by zero if they skipped everything
        const totalAttempted = data.correct + data.wrong;
        const accuracy = totalAttempted > 0 ? ((data.correct / totalAttempted) * 100).toFixed(1) : 0;
        
        // Format seconds into MM:SS
        const minutes = Math.floor(data.timeTaken / 60);
        const seconds = data.timeTaken % 60;
        const formattedTime = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;

        // 3. Inject into your HTML 
        document.getElementById('score-display').innerText = data.score;
        document.getElementById('correct-display').innerText = data.correct;
        document.getElementById('wrong-display').innerText = data.wrong;
        document.getElementById('accuracy-display').innerText = `${accuracy}%`;
        document.getElementById('time-display').innerText = formattedTime;

        // 4. Trigger the leaderboard render
        if(data.testId) {
            renderLeaderboard(data.testId);
        }
    });

    // 5. The Leaderboard Engine (from earlier)
    async function renderLeaderboard(testId) {
        const tbody = document.getElementById("leaderboard-body");
        if (!tbody) return; // Skip if you haven't added the leaderboard HTML yet

        try {
            const entriesRef = collection(db, "leaderboards", testId, "entries");
            const q = query(entriesRef, orderBy("score", "desc"), orderBy("timestamp", "asc"), limit(10));
            const querySnapshot = await getDocs(q);
            
            if (querySnapshot.empty) {
                tbody.innerHTML = `<tr><td colspan="3" style="text-align: center;">No attempts yet.</td></tr>`;
                return;
            }

            tbody.innerHTML = ""; 
            let rank = 1;

            querySnapshot.forEach((doc) => {
                const rowData = doc.data();
                let rowClass = rank === 1 ? "rank-1" : rank === 2 ? "rank-2" : rank === 3 ? "rank-3" : "";
                
                tbody.innerHTML += `
                    <tr class="${rowClass}">
                        <td>#${rank}</td>
                        <td>${rowData.userName}</td>
                        <td>${rowData.score}</td>
                    </tr>
                `;
                rank++;
            });
        } catch (error) {
            console.error("Failed to load leaderboard:", error);
            tbody.innerHTML = `<tr><td colspan="3" style="text-align: center;">Failed to load rankings.</td></tr>`;
        }
    }
  </script>
</body>
</html>
