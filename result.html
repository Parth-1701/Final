<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ExamForge — Test Results</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f; 
      --surface: #12121a; 
      --surface2: #1a1a26; 
      --border: #2a2a3d; 
      --accent: #6c63ff; 
      --accent-glow: rgba(108,99,255,0.25);
      --green: #3ecf8e; 
      --green-soft: rgba(62,207,142,0.1);
      --red: #f56565; 
      --red-soft: rgba(245,101,101,0.1);
      --yellow: #f6c90e; 
      --text: #e2e2f0; 
      --text-dim: #9999b8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Navbar */
    header {
      padding: 20px 40px;
      border-bottom: 1px solid var(--border);
      background: rgba(18, 18, 26, 0.8);
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.5px;
    }
    .logo span { color: var(--accent); }

    /* Main Container */
    .container {
      max-width: 1000px;
      margin: 40px auto;
      padding: 0 20px;
      width: 100%;
      flex: 1;
      animation: fadeIn 0.5s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .page-header {
      text-align: center;
      margin-bottom: 40px;
    }
    .page-header h1 {
      font-family: 'Syne', sans-serif;
      font-size: 2.5rem;
      margin-bottom: 10px;
    }
    .page-header p {
      color: var(--text-dim);
      font-size: 1.1rem;
    }

    /* Results Grid */
    .results-grid {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 30px;
      margin-bottom: 40px;
    }

    @media (max-width: 768px) {
      .results-grid { grid-template-columns: 1fr; }
    }

    /* Score Card (Left) */
    .score-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 30px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    
    .score-value {
      font-family: 'Syne', sans-serif;
      font-size: 4rem;
      font-weight: 800;
      color: var(--accent);
      text-shadow: 0 0 20px var(--accent-glow);
      line-height: 1;
      margin-bottom: 5px;
    }
    .score-label {
      color: var(--text-dim);
      font-size: 1.1rem;
      margin-bottom: 30px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Circular Accuracy Chart */
    .chart-container {
      position: relative;
      width: 150px;
      height: 150px;
    }
    .circular-chart {
      display: block;
      margin: 0 auto;
      max-width: 80%;
      max-height: 250px;
    }
    .circle-bg {
      fill: none;
      stroke: var(--surface2);
      stroke-width: 3.8;
    }
    .circle {
      fill: none;
      stroke-width: 2.8;
      stroke-linecap: round;
      animation: progress 1s ease-out forwards;
    }
    @keyframes progress {
      0% { stroke-dasharray: 0 100; }
    }
    .percentage {
      fill: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 0.5rem;
      font-weight: 700;
      text-anchor: middle;
    }
    .accuracy-label {
      fill: var(--text-dim);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.2rem;
      text-anchor: middle;
    }

    /* Stats Grid (Right) */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    .stat-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 25px;
      display: flex;
      align-items: center;
      gap: 20px;
      transition: transform 0.2s;
    }
    .stat-box:hover {
      transform: translateY(-5px);
      border-color: var(--accent);
    }

    .stat-icon {
      width: 50px;
      height: 50px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
    }
    .icon-correct { background: var(--green-soft); color: var(--green); }
    .icon-wrong { background: var(--red-soft); color: var(--red); }
    .icon-skipped { background: var(--surface2); color: var(--text-dim); }
    .icon-time { background: var(--accent-glow); color: var(--accent); }

    .stat-info h3 {
      font-size: 1.8rem;
      font-family: 'Syne', sans-serif;
      margin-bottom: 5px;
    }
    .stat-info p {
      color: var(--text-dim);
      font-size: 0.95rem;
    }

    /* Action Buttons */
    .actions {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-top: 20px;
    }
    .btn {
      padding: 15px 30px;
      border-radius: 8px;
      font-weight: 700;
      font-family: 'DM Sans', sans-serif;
      font-size: 1.1rem;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
      border: none;
    }
    .btn-primary {
      background: var(--accent);
      color: white;
      box-shadow: 0 4px 15px var(--accent-glow);
    }
    .btn-primary:hover {
      background: #5a52d5;
      transform: translateY(-2px);
    }
    .btn-secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover {
      background: var(--surface2);
    }

    /* Error State */
    .error-state {
      text-align: center;
      padding: 100px 20px;
    }
  </style>
</head>
<body>

  <header>
    <a href="index.html" class="logo">Exam<span>Forge</span></a>
  </header>

  <div class="container" id="results-container">
    </div>

  <script>
    function formatTime(seconds) {
      const h = Math.floor(seconds / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      const s = seconds % 60;
      if (h > 0) return `${h}h ${m}m ${s}s`;
      return `${m}m ${s}s`;
    }

    function renderResults() {
      const container = document.getElementById('results-container');
      const rawData = sessionStorage.getItem('examResult');

      if (!rawData) {
        container.innerHTML = `
          <div class="error-state">
            <h1 style="font-family: 'Syne'; margin-bottom: 15px;">No Results Found</h1>
            <p style="color: var(--text-dim); margin-bottom: 30px;">It looks like you haven't taken a test yet, or the session expired.</p>
            <a href="index.html" class="btn btn-primary">Return to Dashboard</a>
          </div>
        `;
        return;
      }

      const data = JSON.parse(rawData);
      
      // Calculations
      const totalAttempted = data.correct + data.wrong;
      const accuracy = totalAttempted > 0 ? Math.round((data.correct / totalAttempted) * 100) : 0;
      
      // Determine stroke color based on accuracy
      let strokeColor = "var(--green)";
      if (accuracy < 40) strokeColor = "var(--red)";
      else if (accuracy < 75) strokeColor = "var(--yellow)";

      container.innerHTML = `
        <div class="page-header">
          <h1>Exam Completed!</h1>
          <p>Great job, ${data.userName.split(' ')[0]}! Here is your performance breakdown.</p>
        </div>

        <div class="results-grid">
          
          <div class="score-card">
            <div class="score-value">${data.score}</div>
            <div class="score-label">Total Marks</div>
            
            <div class="chart-container">
              <svg viewBox="0 0 36 36" class="circular-chart">
                <path class="circle-bg"
                  d="M18 2.0845
                    a 15.9155 15.9155 0 0 1 0 31.831
                    a 15.9155 15.9155 0 0 1 0 -31.831"
                />
                <path class="circle"
                  stroke="${strokeColor}"
                  stroke-dasharray="${accuracy}, 100"
                  d="M18 2.0845
                    a 15.9155 15.9155 0 0 1 0 31.831
                    a 15.9155 15.9155 0 0 1 0 -31.831"
                />
                <text x="18" y="19.5" class="percentage">${accuracy}%</text>
                <text x="18" y="24" class="accuracy-label">ACCURACY</text>
              </svg>
            </div>
          </div>

          <div class="stats-grid">
            <div class="stat-box">
              <div class="stat-icon icon-correct">✓</div>
              <div class="stat-info">
                <h3>${data.correct}</h3>
                <p>Correct Answers</p>
              </div>
            </div>
            
            <div class="stat-box">
              <div class="stat-icon icon-wrong">✗</div>
              <div class="stat-info">
                <h3>${data.wrong}</h3>
                <p>Incorrect Answers</p>
              </div>
            </div>

            <div class="stat-box">
              <div class="stat-icon icon-skipped">−</div>
              <div class="stat-info">
                <h3>${data.unattempted}</h3>
                <p>Skipped Questions</p>
              </div>
            </div>

            <div class="stat-box">
              <div class="stat-icon icon-time">⏱</div>
              <div class="stat-info">
                <h3 style="font-size: 1.4rem;">${formatTime(data.timeTaken)}</h3>
                <p>Time Taken</p>
              </div>
            </div>
          </div>

        </div>

        <div class="actions">
          <a href="index.html" class="btn btn-secondary">Go to Dashboard</a>
          <a href="#" class="btn btn-primary" onclick="alert('Detailed Review Analysis coming soon!'); return false;">Review Mistakes</a>
        </div>
      `;
    }

    // Initialize Page
    renderResults();
  </script>
</body>
</html>
